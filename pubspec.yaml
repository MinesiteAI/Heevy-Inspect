name: heevy_inspect
description: Heevy Inspect — field capture for inspections and anomalies.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  shared_preferences: ^2.3.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.6
  app_links: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/dark.png
    - assets/light.png
