name: heevy_inspect
description: Heevy Inspect — field capture for inspections and anomalies.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  shared_preferences: ^2.3.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.6
  app_links: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/app_icon.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#000000"
  image: assets/dark.png
  color_dark: "#000000"
  image_dark: assets/dark.png
  android_12:
    image: assets/dark.png
    color: "#000000"
    image_dark: assets/dark.png
    color_dark: "#000000"

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/dark.png
    - assets/light.png
