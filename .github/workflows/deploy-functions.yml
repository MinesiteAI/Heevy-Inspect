name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

concurrency:
  group: deploy-functions-heevy-inspect-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.98.2

      - name: Deploy mobile-submit-field-capture
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          PROJECT_ID="${SUPABASE_PROJECT_REF:-ribjmoizwcvowrbhbfri}"
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret required"
            exit 1
          fi
          supabase functions deploy mobile-submit-field-capture \
            --project-ref "$PROJECT_ID" \
            --use-api
