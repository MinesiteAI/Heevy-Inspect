name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

concurrency:
  group: deploy-functions-heevy-inspect-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.98.2

      - name: Deploy Heevy Inspect edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          PROJECT_ID="${SUPABASE_PROJECT_REF:-ribjmoizwcvowrbhbfri}"
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret required"
            exit 1
          fi
          FUNCTIONS=(
            mobile-submit-field-capture
            mobile-submit-pm-inspection
            mobile-create-work-order
            mobile-list-work-orders
            mobile-get-work-order
            mobile-list-work-requests
            mobile-get-work-request
            mobile-create-pm-template
            mobile-field-chat
            mobile-sign-storage-urls
          )
          for fn in "${FUNCTIONS[@]}"; do
            echo "Deploying $fn..."
            supabase functions deploy "$fn" \
              --project-ref "$PROJECT_ID" \
              --use-api
          done
